# prometheus-digital-eu/netlify.toml

[[headers]]
  for = "/*"
  [headers.values]
    # Engedélyezzük a Google Analytics minden szerverét (region1 is!)
    # Fonts are now self-hosted — removed fonts.googleapis.com and fonts.gstatic.com
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com; connect-src 'self' https://www.google-analytics.com https://analytics.google.com https://www.googletagmanager.com https://region1.google-analytics.com https://*.google-analytics.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://placehold.co https://images.unsplash.com https://www.google-analytics.com; font-src 'self'; frame-src 'self' https://www.google.com; object-src 'none'; frame-ancestors 'none';"

    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache: font files (1 year, immutable)
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache: Astro hashed assets (1 year, immutable)
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache: images (1 month)
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"